name: Production Release

on:
  workflow_dispatch:
    inputs:
      deploy_cloud:
        description: 'Deploy Cloud AI backend'
        type: boolean
        default: true
      deploy_website:
        description: 'Deploy Website'
        type: boolean
        default: true
      build_desktop:
        description: 'Build Desktop App'
        type: boolean
        default: true

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  GAR_REPO: ${{ secrets.GAR_REPO }}
  GAR_HOST: ${{ secrets.GCP_REGION }}-docker.pkg.dev

jobs:
  # 1. Deploy Cloud AI (Backend) to Cloud Run (Production)
  deploy-prod-backend:
    name: Cloud AI (Production)
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_cloud == 'true' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker $GAR_HOST --quiet

      - name: Build & Push Container
        working-directory: apps/cloud-ai
        run: |
          IMAGE="$GAR_HOST/$GCP_PROJECT_ID/$GAR_REPO/stuard-cloud-ai:latest"
          # Tag with commit SHA for rollback + latest
          docker build -t "$IMAGE" -t "$GAR_HOST/$GCP_PROJECT_ID/$GAR_REPO/stuard-cloud-ai:${{ github.sha }}" .
          docker push "$IMAGE"
          docker push "$GAR_HOST/$GCP_PROJECT_ID/$GAR_REPO/stuard-cloud-ai:${{ github.sha }}"

      - name: Deploy to Cloud Run (Production)
        run: |
          IMAGE="$GAR_HOST/$GCP_PROJECT_ID/$GAR_REPO/stuard-cloud-ai:latest"
          gcloud run deploy stuard-cloud-ai-prod \
            --image "$IMAGE" \
            --region "$GCP_REGION" \
            --platform managed \
            --allow-unauthenticated \
            --service-account "${{ secrets.GCP_RUN_SA }}" \
            --set-env-vars NODE_ENV=production,CLOUD_PUBLIC_URL=https://api.stuard.ai,WEBSITE_BASE_URL=https://stuard.ai,SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --set-secrets XAI_API_KEY=XAI_API_KEY:latest,GOOGLE_GENERATIVE_AI_API_KEY=GOOGLE_GENERATIVE_AI_API_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,SUPABASE_PUBLISHABLE_KEY=SUPABASE_PUBLISHABLE_KEY:latest,SUPABASE_SECRET_KEY=SUPABASE_SECRET_KEY:latest,PERPLEXITY_API_KEY=PERPLEXITY_API_KEY:latest,ASSEMBLYAI_API_KEY=ASSEMBLYAI_API_KEY:latest,OPENROUTER_API_KEY=OPENROUTER_API_KEY:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest

  # 2. Deploy Website (Frontend) to Vercel Production
  deploy-prod-website:
    name: Website (Production)
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_website == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel environment (production)
        working-directory: apps/website
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build with Vercel (production)
        working-directory: apps/website
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy prebuilt to Vercel (Prod)
        working-directory: apps/website
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  # 3. Release Desktop App for all platforms
  release-desktop:
    name: Desktop App (Production - ${{ matrix.os }}${{ matrix.arch && format(' {0}', matrix.arch) || '' }})
    if: ${{ github.event.inputs.build_desktop == 'true' }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-ext: exe
          - os: macos-13
            artifact-ext: dmg
            arch: x64
          - os: macos-latest
            artifact-ext: dmg
            arch: arm64
          - os: ubuntu-latest
            artifact-ext: AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      # Build Python Agent first
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk python3-dev scrot xvfb libportaudio2
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'apps/agent/requirements.txt'
      
      - name: Install Python dependencies
        working-directory: apps/agent
        run: pip install -r requirements.txt
      
      - name: Build Python Agent
        working-directory: apps/agent
        run: python build-agent.py
      
      - name: Verify Agent Binary
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            ls -la dist/stuard-agent.exe
          elif [ "$RUNNER_OS" == "macOS" ]; then
            ls -la dist/stuard-agent-macos
          else
            ls -la dist/stuard-agent-linux
          fi
        shell: bash
      
      # Build Electron App (use npm for desktop to avoid pnpm transitive dep issues)
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Desktop Dependencies
        working-directory: apps/desktop
        run: npm install
      - name: Write Cloud Config for Production
        shell: bash
        run: |
          mkdir -p "$GITHUB_WORKSPACE/apps/desktop/build/agent"
          echo "CLOUD_PUBLIC_URL=https://api.stuard.ai" > "$GITHUB_WORKSPACE/apps/desktop/build/.env"
          echo "CLOUD_AI_HTTP=https://api.stuard.ai" >> "$GITHUB_WORKSPACE/apps/desktop/build/.env"
          echo "UPDATE_CHANNEL=stable" >> "$GITHUB_WORKSPACE/apps/desktop/build/.env"
          echo "STUARD_UPDATE_BASE_URL=https://updates.stuard.ai/desktop" >> "$GITHUB_WORKSPACE/apps/desktop/build/.env"
          cp "$GITHUB_WORKSPACE/apps/desktop/build/.env" "$GITHUB_WORKSPACE/apps/desktop/build/agent/.env"
      - name: Build Desktop App
        working-directory: apps/desktop
        run: |
          if [ -n "${{ matrix.arch }}" ]; then
            npm run build && npm run prepare:agent && npx electron-builder --${{ matrix.arch }}
          else
            npm run dist
          fi
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUD_PUBLIC_URL: "https://api.stuard.ai"
          # NOTE: PostHog is NOT enabled in production (privacy-first)
          # VITE_PUBLIC_POSTHOG_KEY and VITE_PUBLIC_POSTHOG_HOST intentionally omitted
          # macOS code signing (optional - uncomment when ready)
          # CSC_LINK: ${{ secrets.MAC_CERTIFICATE_BASE64 }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      
      # Windows: Compile Inno Setup installer
      - name: Get App Version
        if: runner.os == 'Windows'
        id: version
        shell: bash
        run: echo "version=$(node -p "require('./apps/desktop/package.json').version")" >> $GITHUB_OUTPUT
      
      - name: Compile Inno Setup Installer
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMY_APP_VERSION=${{ steps.version.outputs.version }} apps\desktop\inno\setup.iss
      
      - name: Configure R2 credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      # Generate update manifest
      - name: Generate Update Manifest (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: node apps/desktop/scripts/generate-update-manifest.cjs ${{ steps.version.outputs.version }} stable windows
      
      - name: Generate Update Manifest (Mac)
        if: runner.os == 'macOS'
        run: |
          VERSION=$(node -p "require('./apps/desktop/package.json').version")
          node apps/desktop/scripts/generate-update-manifest.cjs $VERSION stable mac
      
      - name: Generate Update Manifest (Linux)
        if: runner.os == 'Linux'
        run: |
          VERSION=$(node -p "require('./apps/desktop/package.json').version")
          node apps/desktop/scripts/generate-update-manifest.cjs $VERSION stable linux
      
      # Upload artifacts + manifest
      - name: Upload to R2 (Mac)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # Upload with architecture suffix for clarity
          ENDPOINT="https://${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          for f in apps/desktop/release/*.dmg; do
            filename=$(basename "$f" .dmg)
            aws s3 cp "$f" "s3://${{ secrets.CLOUDFLARE_R2_BUCKET }}/desktop/stable/${filename}-${{ matrix.arch }}.dmg" --endpoint-url "$ENDPOINT"
          done
          for f in apps/desktop/release/*.zip; do
            filename=$(basename "$f" .zip)
            aws s3 cp "$f" "s3://${{ secrets.CLOUDFLARE_R2_BUCKET }}/desktop/stable/${filename}-${{ matrix.arch }}.zip" --endpoint-url "$ENDPOINT"
          done || true
          aws s3 cp apps/desktop/release/latest-mac.yml "s3://${{ secrets.CLOUDFLARE_R2_BUCKET }}/desktop/stable/latest-mac-${{ matrix.arch }}.yml" --endpoint-url "$ENDPOINT"
      
      - name: Upload to R2 (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          ENDPOINT="https://${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          CACHE_ASSET="public, max-age=31536000, immutable"
          CACHE_MANIFEST="public, max-age=60"
          aws s3 cp apps/desktop/release/*.AppImage "s3://${{ secrets.CLOUDFLARE_R2_BUCKET }}/desktop/stable/" --endpoint-url "$ENDPOINT" --cache-control "$CACHE_ASSET"
          aws s3 cp apps/desktop/release/latest-linux.yml "s3://${{ secrets.CLOUDFLARE_R2_BUCKET }}/desktop/stable/latest-linux.yml" --endpoint-url "$ENDPOINT" --cache-control "$CACHE_MANIFEST"
      
      - name: Upload to R2 (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          ENDPOINT="https://${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          CACHE_ASSET="public, max-age=31536000, immutable"
          CACHE_MANIFEST="public, max-age=60"
          aws s3 cp apps/desktop/release/StuardAI-Setup-*.exe "s3://${{ secrets.CLOUDFLARE_R2_BUCKET }}/desktop/stable/" --endpoint-url "$ENDPOINT" --cache-control "$CACHE_ASSET"
          aws s3 cp apps/desktop/release/latest.yml "s3://${{ secrets.CLOUDFLARE_R2_BUCKET }}/desktop/stable/latest.yml" --endpoint-url "$ENDPOINT" --cache-control "$CACHE_MANIFEST"